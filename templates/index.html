<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Match AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 900px;
            margin: auto;
            padding-top: 80px;
        }

        h1 {
            font-size: 40px;
            text-align: center;
            margin-bottom: 40px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }

        button {
            background: #6366f1;
            border: none;
            padding: 14px 24px;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
            margin-bottom: 20px;
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            display: block;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 40px;
            background: #020617;
            border-bottom: 1px solid #1f2937;
            font-weight: 600;
            font-size: 16px;
            box-sizing: border-box;
            z-index: 100;
        }
    </style>
</head>
<body>

<nav>Resume Match AI</nav>

<div class="container">

    <h1>Resume → Job Match AI</h1>

    <div class="card">
        <form action="/analyze" method="post" enctype="multipart/form-data">

            <label>Upload Resume (PDF)</label>
            <input type="file" name="resume" accept=".pdf" required>

            <label>Paste Job Description</label>
            <textarea name="job_description" rows="6" required></textarea>

            <button type="submit">Analyze Resume</button>

        </form>
    </div>

</div>

</body>
</html>
